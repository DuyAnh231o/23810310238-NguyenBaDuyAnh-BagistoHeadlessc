type Category {
    id: ID!
    name: String
    slug: String
}

type Product {
    id: ID!
    name: String
    description: String
    price: Float
    url_key: String
}

type Query {
    categories: [Category] @all(model: "Webkul\\Category\\Models\\Category")
    products: [Product] @all(model: "Webkul\\Product\\Models\\Product")
}